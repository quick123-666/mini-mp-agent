name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run stdlib test runners
        run: |
          set -e
          for t in tests/test_*.py; do
            echo "=== $t ==="
            python "$t"
          done

      - name: Install pytest (optional)
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: pytest (optional cross-check)
        run: |
          python -m pytest tests/ -q --tb=line || echo "pytest discovery is best-effort; stdlib runners above are authoritative"
        continue-on-error: true
